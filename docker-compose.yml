services:
  backend:
    build: ./backend
    container_name: idea-incubator-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/idea-incubator
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: development
      CLIENT_ORIGIN: http://localhost:5173
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npx nodemon server.js

  mongo:
    image: mongo:7
    container_name: idea-incubator-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
